<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拉霸與格擋：無敵防誤觸版</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #111; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none;
        }

        #game-container {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100vw; position: relative;
        }

        @keyframes shake-micro { 0% {transform: translate(0px, 1px)} 50% {transform: translate(0px, -1px)} 100% {transform: translate(0px, 0px)} }
        @keyframes shake-light { 0% { transform: translate(1px, 1px) } 25% { transform: translate(-2px, -1px) } 50% { transform: translate(1px, 2px) } 75% { transform: translate(-1px, 1px) } 100% { transform: translate(0px, 0px) } }
        @keyframes shake-heavy { 0% { transform: translate(4px, 4px) rotate(1deg); } 25% { transform: translate(-5px, -3px) rotate(-1deg); } 50% { transform: translate(3px, 6px) rotate(2deg); } 75% { transform: translate(-6px, 2px) rotate(-2deg); } 100% { transform: translate(0px, 0px) rotate(0deg); } }
        .shake-micro { animation: shake-micro 0.1s ease-out; }
        .shake-light { animation: shake-light 0.15s ease-out; }
        .shake-heavy { animation: shake-heavy 0.3s ease-out; }

        #flash-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: white; opacity: 0; pointer-events: none;
            z-index: 100; transition: opacity 0.05s ease-out;
        }

        #top-ui {
            width: 100%; max-width: 600px; padding: 10px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; background-color: rgba(34, 34, 34, 0.9);
            border-bottom: 2px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hp-container { display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; }
        .hp-box { background: #2a2a2a; padding: 10px 20px; border-radius: 8px; border: 2px solid #555; text-align: center; flex: 1; margin: 0 5px; transition: all 0.2s ease-out; }
        
        /* 玩家無敵狀態特效 */
        .hp-box.invincible {
            border-color: #ffeb3b;
            box-shadow: 0 0 15px #ffeb3b;
            background: rgba(255, 235, 59, 0.15);
            color: #ffeb3b;
            font-weight: bold;
        }

        @keyframes damageFlash { 0% { border-color: #ff1744; box-shadow: 0 0 20px #ff1744; background: #5a0000; } 100% { border-color: #555; box-shadow: none; background: #2a2a2a; } }
        .hp-box.damaged { animation: damageFlash 0.2s ease-out; }
        .hp-bar { width: 100%; height: 20px; background: #111; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px inset #333; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #81c784); width: 100%; transition: width 0.1s ease-out; }
        #enemy-hp-fill { background: linear-gradient(90deg, #d50000, #ff5252); }

        /* 拉霸機 */
        #slot-machine-container {
            display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 350px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 3px solid #ffeb3b; padding: 10px 20px; border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.4); cursor: pointer; transition: transform 0.05s;
        }
        #slot-machine-container:active { transform: scale(0.97); }
        
        .slots { display: flex; gap: 15px; font-size: 40px; margin-bottom: 5px; background: #050505; padding: 10px; border-radius: 8px; border: inset 4px #444; position: relative; overflow: hidden; }
        .slot-item { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: all 0.1s; }
        .slot-item.spinning { transform: scaleY(1.5); color: #888; }
        @keyframes lock-in-pop { 0% { transform: scale(1.4); filter: brightness(2); } 50% { transform: scale(0.9); filter: brightness(1.5); } 100% { transform: scale(1); filter: brightness(1); } }
        .slot-item.locked { animation: lock-in-pop 0.25s ease-out forwards; }
        @keyframes tension-shake { 0% { transform: translateY(-3px) scaleY(1.4); } 50% { transform: translateY(3px) scaleY(1.4); } 100% { transform: translateY(-3px) scaleY(1.4); } }
        .slot-item.tension { animation: tension-shake 0.05s infinite; filter: brightness(1.5); color: #ff1744; box-shadow: inset 0 0 20px #ff1744; background: #ffebee; }

        .slot-info { color: #ffeb3b; font-weight: bold; font-size: 16px; text-shadow: 0 0 5px #ffeb3b; transition: color 0.2s; text-align: center; width: 100%;}
        .slot-info.highlight { color: #ff1744; text-shadow: 0 0 15px #ff1744; font-size: 18px;}
        .slot-chain-text { color: #00e5ff; font-size: 14px; margin-top: 5px; text-shadow: 0 0 5px #00e5ff; display: none; }

        #buff-bar-container { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 10px; display: none; border: 1px solid #444; }
        #buff-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ffeb3b, #ff9800); }

        /* 戰鬥區 */
        #battle-area { flex-grow: 1; width: 100%; position: relative; display: flex; justify-content: center; align-items: center; cursor: crosshair; }
        .hint-text { color: #444; font-size: 28px; font-weight: bold; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        #parry-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 20; }
        #vfx-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; font-weight: 900; font-style: italic; pointer-events: none; z-index: 30;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="flash-overlay"></div>

        <div id="top-ui">
            <div class="hp-container">
                <div class="hp-box" id="player-hp-box">
                    <div id="player-status-text">玩家 HP</div>
                    <div class="hp-bar"><div id="player-hp-fill" class="hp-fill"></div></div>
                </div>
                <div class="hp-box" id="enemy-hp-box">
                    <div>敵人 HP</div>
                    <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill"></div></div>
                </div>
            </div>

            <div id="slot-machine-container" onpointerdown="spinSlot()">
                <div class="slots">
                    <div class="slot-item" id="slot1">🍒</div>
                    <div class="slot-item" id="slot2">🍒</div>
                    <div class="slot-item" id="slot3">🍒</div>
                </div>
                <div class="slot-info" id="slot-status">點擊啟動拉霸機！</div>
                <div class="slot-chain-text" id="slot-chain">連莊機率提升！</div>
                <div id="buff-bar-container"><div id="buff-bar-fill"></div></div>
            </div>
        </div>

        <div id="battle-area" onpointerdown="attackEnemy(event)">
            <div class="hint-text">狂點畫面攻擊！</div>
            <canvas id="parry-canvas"></canvas>
        </div>
        
        <canvas id="vfx-canvas"></canvas>
        <div id="message"></div>
    </div>

    <script>
        // --- 狀態 ---
        let maxPlayerHp = 100, playerHp = 100;
        let maxEnemyHp = 3000, enemyHp = 3000; 
        let baseAttack = 10, currentMultiplier = 1, enemyDamage = 20;

        let isEnemyAttacking = false;
        let parryRadius = 0; 
        const targetRadius = 60; 
        const tolerance = 25; 
        let parryShrinkSpeed = 5; 
        let parryAnimationId;
        
        let targetX = 0;
        let targetY = 0;

        // 新增：無敵狀態
        let jackpotBonusChance = 0; 
        let buffInterval = null;
        let buffEndTime = 0;
        let isInvincible = false;

        // --- DOM ---
        const container = document.getElementById('game-container');
        const flashOverlay = document.getElementById('flash-overlay');
        const playerHpBox = document.getElementById('player-hp-box');
        const playerStatusText = document.getElementById('player-status-text');
        const enemyHpBox = document.getElementById('enemy-hp-box');
        const playerHpFill = document.getElementById('player-hp-fill');
        const enemyHpFill = document.getElementById('enemy-hp-fill');
        const slotStatus = document.getElementById('slot-status');
        const slotChainText = document.getElementById('slot-chain');
        const buffContainer = document.getElementById('buff-bar-container');
        const buffFill = document.getElementById('buff-bar-fill');
        const slots = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
        const battleArea = document.getElementById('battle-area');
        const parryCanvas = document.getElementById('parry-canvas');
        const parryCtx = parryCanvas.getContext('2d');
        const vfxCanvas = document.getElementById('vfx-canvas');
        const vfxCtx = vfxCanvas.getContext('2d');
        const msgDiv = document.getElementById('message');

        const symbols = ['🍒', '🍋', '🔔', '💎', '7️⃣'];

        // --- 初始化 ---
        function resizeCanvas() { vfxCanvas.width = window.innerWidth; vfxCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function showMessage(msg, color) {
            msgDiv.innerText = msg; msgDiv.style.color = color;
            msgDiv.style.transform = `translate(-50%, -50%) scale(1.3)`;
            setTimeout(() => msgDiv.style.transform = `translate(-50%, -50%) scale(1)`, 50);
            setTimeout(() => { msgDiv.innerText = ""; }, 600);
        }

        function triggerShake(intensity = 'light') { container.classList.remove('shake-micro', 'shake-light', 'shake-heavy'); void container.offsetWidth; container.classList.add(`shake-${intensity}`); }
        function triggerFlash() { flashOverlay.style.opacity = '0.5'; setTimeout(() => flashOverlay.style.opacity = '0', 50); }

        function updateUI(target, isDamaged) {
            if (target === 'player') {
                playerHpFill.style.width = Math.max(0, (playerHp / maxPlayerHp) * 100) + '%';
                if (isDamaged) { playerHpBox.classList.add('damaged'); setTimeout(() => playerHpBox.classList.remove('damaged'), 200); }
            } else if (target === 'enemy') {
                enemyHpFill.style.width = Math.max(0, (enemyHp / maxEnemyHp) * 100) + '%';
                if (isDamaged) { enemyHpBox.classList.add('damaged'); enemyHpBox.style.transform = 'scale(1.05)'; setTimeout(() => { enemyHpBox.classList.remove('damaged'); enemyHpBox.style.transform = 'scale(1)'; }, 100); }
            }
        }

        // --- VFX ---
        let particles = [], damageNumbers = [], slashes = [];
        function addVfx(x, y, type) {
            if (type === 'hit') {
                slashes.push({ x: x, y: y, angle: Math.random() * Math.PI * 2, length: 100 + Math.random() * 80, alpha: 1, decay: 0.1 });
                for (let i = 0; i < 12; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15 - 5, gravity: 0.8, size: Math.random() * 6 + 2, color: currentMultiplier >= 5 ? '#00e5ff' : '#ffeb3b', alpha: 1, decay: 0.03 + Math.random() * 0.03 }); }
            } else if (type === 'parry') {
                particles.push({ x: x, y: y, type: 'shockwave', size: 20, color: '#00e676', alpha: 1, decay: 0.04 });
                for (let i = 0; i < 40; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.5) * 30, gravity: 0, size: Math.random() * 10 + 4, color: '#b2ff59', alpha: 1, decay: 0.04 }); }
            } else if (type === 'shield') {
                // 無敵格擋特效
                particles.push({ x: x, y: y, type: 'shockwave', size: 25, color: '#ffeb3b', alpha: 1, decay: 0.03 });
            }
        }

        function addDamageNumber(x, y, damage, multiplier) { damageNumbers.push({ x: x + (Math.random() - 0.5) * 40, y: y - 20, damage: damage, multiplier: multiplier, vx: (Math.random() - 0.5) * 2, vy: -6 - Math.random() * 4, gravity: 0.4, alpha: 1.5, scale: multiplier >= 5 ? 1.5 : 1 }); }

        function updateVfx() {
            vfxCtx.clearRect(0, 0, vfxCanvas.width, vfxCanvas.height);
            for (let i = slashes.length - 1; i >= 0; i--) { let s = slashes[i]; s.alpha -= s.decay; vfxCtx.save(); vfxCtx.translate(s.x, s.y); vfxCtx.rotate(s.angle); vfxCtx.beginPath(); vfxCtx.moveTo(-s.length/2, 0); vfxCtx.lineTo(s.length/2, 0); vfxCtx.strokeStyle = `rgba(255, 255, 255, ${s.alpha})`; vfxCtx.lineWidth = 4 + s.alpha * 4; vfxCtx.shadowBlur = 10; vfxCtx.shadowColor = '#fff'; vfxCtx.stroke(); vfxCtx.restore(); if (s.alpha <= 0) slashes.splice(i, 1); }
            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; if (p.type === 'shockwave') { p.size += 15; p.alpha -= p.decay; vfxCtx.beginPath(); vfxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); vfxCtx.strokeStyle = `rgba(0, 230, 118, ${p.alpha})`; if(p.color === '#ffeb3b') vfxCtx.strokeStyle = `rgba(255, 235, 59, ${p.alpha})`; vfxCtx.lineWidth = 8; vfxCtx.stroke(); } else { p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay; vfxCtx.beginPath(); vfxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); vfxCtx.fillStyle = p.color; vfxCtx.globalAlpha = Math.max(0, p.alpha); vfxCtx.fill(); vfxCtx.globalAlpha = 1; } if (p.alpha <= 0) particles.splice(i, 1); }
            for (let i = damageNumbers.length - 1; i >= 0; i--) { let d = damageNumbers[i]; d.vy += d.gravity; d.x += d.vx; d.y += d.vy; d.alpha -= 0.03; vfxCtx.save(); vfxCtx.translate(d.x, d.y); vfxCtx.scale(d.scale, d.scale); vfxCtx.font = '900 36px Arial'; vfxCtx.fillStyle = `rgba(255, 60, 60, ${Math.min(1, d.alpha)})`; vfxCtx.strokeStyle = `rgba(0, 0, 0, ${Math.min(1, d.alpha)})`; vfxCtx.lineWidth = 4; let text = `-${d.damage}` + (d.multiplier > 1 ? `(x${d.multiplier})` : ""); vfxCtx.strokeText(text, 0, 0); vfxCtx.fillText(text, 0, 0); vfxCtx.restore(); if (d.alpha <= 0) damageNumbers.splice(i, 1); }
            requestAnimationFrame(updateVfx);
        }
        updateVfx();

        // --- 拉霸機系統 ---
        let isSpinning = false;
        function spinSlot() {
            if (isSpinning) return;
            isSpinning = true;
            slotStatus.innerText = "🌀 旋轉中... 🌀";
            slotStatus.classList.remove('highlight');
            slots.forEach(s => { s.classList.remove('locked', 'tension'); s.classList.add('spinning'); });

            let resultSymbols = [];
            let isForcedJackpot = Math.random() < jackpotBonusChance;
            if (isForcedJackpot) { let prize = Math.random() > 0.5 ? '7️⃣' : '💎'; resultSymbols = [prize, prize, prize]; } 
            else { resultSymbols = [symbols[Math.floor(Math.random() * symbols.length)], symbols[Math.floor(Math.random() * symbols.length)], symbols[Math.floor(Math.random() * symbols.length)]]; }

            let spinState = [true, true, true];
            let visualSpinInterval = setInterval(() => {
                if(spinState[0]) slots[0].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                if(spinState[1]) slots[1].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                if(spinState[2]) slots[2].innerText = symbols[Math.floor(Math.random() * symbols.length)];
            }, 40);

            setTimeout(() => { spinState[0] = false; slots[0].innerText = resultSymbols[0]; slots[0].classList.remove('spinning'); slots[0].classList.add('locked'); triggerShake('micro'); }, 600);
            setTimeout(() => {
                spinState[1] = false; slots[1].innerText = resultSymbols[1]; slots[1].classList.remove('spinning'); slots[1].classList.add('locked'); triggerShake('micro');
                let tensionDelay = 600; let isTension = (resultSymbols[0] === resultSymbols[1] && (resultSymbols[0] === '7️⃣' || resultSymbols[0] === '💎'));
                if (isTension) { tensionDelay = 2000; slots[2].classList.remove('spinning'); slots[2].classList.add('tension'); slotStatus.innerText = "⚠️ 聽牌！要中了嗎？！ ⚠️"; slotStatus.classList.add('highlight'); }
                setTimeout(() => {
                    spinState[2] = false; slots[2].innerText = resultSymbols[2]; slots[2].classList.remove('spinning', 'tension'); slots[2].classList.add('locked');
                    clearInterval(visualSpinInterval); calcSlot(resultSymbols[0], resultSymbols[1], resultSymbols[2]); isSpinning = false;
                }, tensionDelay);
            }, 1200);
        }

        function calcSlot(s1, s2, s3) {
            slotStatus.classList.remove('highlight');
            let isJackpot = false;
            
            if (s1 === s2 && s2 === s3) {
                if (s1 === '7️⃣') { currentMultiplier = 10; isJackpot = true; } 
                else if (s1 === '💎') { currentMultiplier = 5; isJackpot = true; } 
                else { currentMultiplier = 3; }
                showMessage("🔥 終極爆發 🔥", "#ffeb3b"); triggerShake('heavy'); triggerFlash();
            } else if (s1 === s2 || s2 === s3 || s1 === s3) { currentMultiplier = 2; triggerShake('light'); } 
            else { currentMultiplier = 1; }

            // 處理大獎無敵狀態與機率
            if (isJackpot) { 
                jackpotBonusChance += 0.20; 
                slotChainText.innerText = `🔥 連莊機率額外提升 +${Math.round(jackpotBonusChance * 100)}% 🔥`; 
                slotChainText.style.display = 'block'; 
                
                isInvincible = true;
                playerHpBox.classList.add('invincible');
                playerStatusText.innerText = "玩家 HP (🛡️無敵狀態)";
            } else { 
                jackpotBonusChance = 0; 
                slotChainText.style.display = 'none'; 
                
                isInvincible = false;
                playerHpBox.classList.remove('invincible');
                playerStatusText.innerText = "玩家 HP";
            }
            
            slotStatus.innerText = `目前倍率: x${currentMultiplier}`;
            if (currentMultiplier > 1) { startBuffTimer(8000); } else { clearBuffTimer(); }
        }

        function startBuffTimer(duration) {
            clearInterval(buffInterval); buffContainer.style.display = 'block'; buffEndTime = Date.now() + duration;
            buffInterval = setInterval(() => {
                let remaining = buffEndTime - Date.now();
                if (remaining <= 0) { 
                    clearInterval(buffInterval); 
                    currentMultiplier = 1; jackpotBonusChance = 0; 
                    isInvincible = false; playerHpBox.classList.remove('invincible'); playerStatusText.innerText = "玩家 HP";
                    buffContainer.style.display = 'none'; slotChainText.style.display = 'none'; 
                    slotStatus.innerText = "加成結束！點擊重新拉霸"; triggerShake('light'); 
                } else {
                    let percent = (remaining / duration) * 100; buffFill.style.width = percent + '%';
                    if (percent < 25) { buffFill.style.background = 'linear-gradient(90deg, #ff1744, #d50000)'; } else { buffFill.style.background = 'linear-gradient(90deg, #ffeb3b, #ff9800)'; }
                }
            }, 30);
        }
        
        function clearBuffTimer() { 
            clearInterval(buffInterval); buffContainer.style.display = 'none'; 
            isInvincible = false; playerHpBox.classList.remove('invincible'); playerStatusText.innerText = "玩家 HP";
        }

        // --- 核心攻擊 ---
        function executeAttack(clientX, clientY) {
            let totalDamage = baseAttack * currentMultiplier;
            addVfx(clientX, clientY, 'hit');
            addDamageNumber(clientX, clientY, totalDamage, currentMultiplier);
            
            if (currentMultiplier >= 5) { triggerShake('heavy'); triggerFlash(); } else { triggerShake('light'); }
            enemyHp -= totalDamage; updateUI('enemy', true);
            
            if (enemyHp <= 0) { showMessage("敵人已擊破！", "#00e5ff"); triggerShake('heavy'); enemyHp = maxEnemyHp; updateUI('enemy', false); }
        }

        function attackEnemy(e) {
            if (e.target === parryCanvas) return;
            executeAttack(e.clientX, e.clientY);
        }

        // --- 格擋機制 ---
        function startEnemyAttack() {
            if (isEnemyAttacking) return;
            isEnemyAttacking = true; 
            
            const rect = battleArea.getBoundingClientRect();
            parryCanvas.width = rect.width; 
            parryCanvas.height = rect.height;
            
            const padding = targetRadius + 20;
            targetX = padding + Math.random() * (rect.width - padding * 2);
            targetY = padding + Math.random() * (rect.height - padding * 2);
            
            parryRadius = Math.max(rect.width, rect.height) * 1.2;
            
            // 稍微調快：從 110 改為 85 (大約 1.3~1.4秒到達中心)
            parryShrinkSpeed = (parryRadius - targetRadius) / 85; 
            
            parryCanvas.style.display = 'block'; 
            parryCanvas.style.pointerEvents = 'auto';
            drawParry();
        }

        function drawParry() {
            parryCtx.clearRect(0, 0, parryCanvas.width, parryCanvas.height);
            
            parryCtx.beginPath(); 
            parryCtx.arc(targetX, targetY, targetRadius, 0, Math.PI * 2); 
            parryCtx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            parryCtx.fill();
            parryCtx.strokeStyle = 'rgba(255,255,255,0.8)'; 
            parryCtx.lineWidth = 4; 
            parryCtx.setLineDash([10, 10]); 
            parryCtx.stroke(); 
            parryCtx.setLineDash([]);
            
            parryCtx.beginPath(); 
            parryCtx.arc(targetX, targetY, Math.max(0, parryRadius), 0, Math.PI * 2); 
            parryCtx.strokeStyle = '#ff1744'; 
            parryCtx.lineWidth = 6; 
            parryCtx.shadowBlur = 20; 
            parryCtx.shadowColor = '#ff1744'; 
            parryCtx.stroke(); 
            parryCtx.shadowBlur = 0;
            
            parryRadius -= parryShrinkSpeed;
            
            // 只有當光圈縮得比容錯範圍還要小(太晚按)，才會失敗！
            if (parryRadius < targetRadius - tolerance) {
                failParry();
            } else {
                parryAnimationId = requestAnimationFrame(drawParry);
            }
        }

        parryCanvas.addEventListener('pointerdown', (e) => {
            if (!isEnemyAttacking) return;

            const rect = parryCanvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const dist = Math.hypot(clickX - targetX, clickY - targetY);

            // 如果點擊了目標圈附近
            if (dist <= targetRadius + 40) {
                let diff = parryRadius - targetRadius;

                if (diff > tolerance) {
                    // 太早按！這時候不再判定失敗，直接轉換為一般攻擊，而且光圈不消失！
                    executeAttack(e.clientX, e.clientY);
                } else if (Math.abs(diff) <= tolerance) {
                    // 完美格擋
                    successParry(e); 
                }
            } else {
                // 點擊畫面其他地方，照常攻擊
                executeAttack(e.clientX, e.clientY);
            }
        });

        function successParry(e) {
            cancelAnimationFrame(parryAnimationId); triggerShake('heavy'); showMessage("✨ PERFECT ✨", "#00e676");
            addVfx(targetX + parryCanvas.getBoundingClientRect().left, targetY + parryCanvas.getBoundingClientRect().top, 'parry');
            enemyHp -= baseAttack * 5; updateUI('enemy', true); endEnemyAttack();
        }

        function failParry() {
            cancelAnimationFrame(parryAnimationId);
            
            // 無敵狀態判定
            if (isInvincible) {
                triggerShake('light'); 
                showMessage("🛡️ 無敵擋下！", "#ffeb3b");
                addVfx(targetX + parryCanvas.getBoundingClientRect().left, targetY + parryCanvas.getBoundingClientRect().top, 'shield');
                endEnemyAttack();
                return;
            }

            triggerShake('heavy'); showMessage("❌ 受擊 ❌", "#ff1744");
            playerHp -= enemyDamage; updateUI('player', true);
            if (playerHp <= 0) { setTimeout(() => alert("Game Over! 重新開始"), 100); playerHp = maxPlayerHp; enemyHp = maxEnemyHp; updateUI('player', false); updateUI('enemy', false); }
            endEnemyAttack();
        }

        function endEnemyAttack() { isEnemyAttacking = false; parryCanvas.style.display = 'none'; parryCanvas.style.pointerEvents = 'none'; }
        function scheduleNextEnemyAttack() { setTimeout(() => { if (playerHp > 0) startEnemyAttack(); scheduleNextEnemyAttack(); }, Math.random() * 2500 + 2000); }

        updateUI('player', false); updateUI('enemy', false); scheduleNextEnemyAttack();
    </script>
</body>
</html>
